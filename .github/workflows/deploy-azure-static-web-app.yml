name: Deploy Azure Static Web App

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-static-web-app-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        run: python tests.py

      - name: Require Azure deploy token
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ]; then
            echo "::error::Missing production environment secret AZURE_STATIC_WEB_APPS_API_TOKEN."
            exit 1
          fi

      - name: Prepare static site bundle
        run: |
          mkdir -p deploy
          cp index.html style.css app.js sw.js deploy/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: deploy
          output_location: ''
          skip_app_build: true
          production_branch: main
